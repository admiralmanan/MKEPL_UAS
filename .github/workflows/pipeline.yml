name: DevOps Pipeline

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main

jobs:

  build:
    name: Continuous Integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AplikasiStreaming

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Project
        run: mvn clean compile

  test:
    name: Continuous Testing
    needs: build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AplikasiStreaming

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Unit Tests
        run: mvn test

  inspection:
    name: Continuous Inspection
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AplikasiStreaming

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=admiralmanan_MKEPL_UAS \
            -Dsonar.organization=admiralmanan \
            -Dsonar.token=${SONAR_TOKEN}
            -Dsonar.qualitygate.wait=true